<!DOCTYPE html>
<html lang="en" class="shop-page" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zippers | THE EGYPTIAN KING</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <a href="index.html" class="logo">THE EGYPTIAN KING™</a>
  <nav>
    <a href="shop.html">Shop All</a>
    <a href="#">PAST HISTORY</a>
    <a href="terms.html">Information</a>
  </nav>
</header>

<main class="container">
<h2 class="category-title">ZIPPERS</h2>

<div class="product-grid">
  <!-- Product 1 -->
  <div class="product-card">
    <div class="img-holder">
      <img src="https://i.postimg.cc/V6sf3BQH/Untitled-design-(6).png" alt="KOSHK EL 2AMAAN ZIP-UP HOODIE" />
    </div>
    <div class="product-info">
      <span class="category-tag">Collection: Dynasty</span>
      <div class="details">
        <span class="product-name">KOSHK EL 2AMAAN ZIP-UP HOODIE</span>
        <div class="price-container">
          <span class="price price-text" data-base-price="1100">EGP 1100</span>
        </div>
      </div>
      <button class="buy-button" 
        data-product-name="KOSHK EL 2AMAAN ZIP-UP" 
        data-product-price="EGP 1100" 
        data-base-price="1100"
        data-product-image="https://i.postimg.cc/V6sf3BQH/Untitled-design-(6).png">Quick Buy</button>
    </div>
  </div>
  <!-- Add more products here following the same structure -->
</div>
</main>

<script src="cart-engine.js"></script>
<script>
  document.querySelectorAll('.buy-button').forEach(btn => {
    btn.addEventListener('click', () => {
      const product = {
        name: btn.dataset.productName,
        price: parseFloat(btn.dataset.productPrice.replace('EGP ', '')),
        image: btn.dataset.productImage
      };
      addToCart(product);
      showCheckout();
    });
  });
</script>
</body>
</html>
