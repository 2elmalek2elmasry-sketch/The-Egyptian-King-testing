<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | The Egyptian King</title>
    <style>
        :root {
  /* Monochrome Tech Theme */
  --primary: #ffffff; /* White for primary accents */
  --primary-hover: #e5e7eb;
  --primary-glow: rgba(255, 255, 255, 0.15);
  --secondary: #000000;
  --secondary-glow: rgba(0, 0, 0, 0.2);
  --success: #ffffff;
  --danger: #ff4444; /* Keep red for errors/alerts */
  --warning: #888888;
  --info: #ffffff;

  --font-display: 'Outfit', sans-serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;

  --transition-smooth: all .35s cubic-bezier(.16, 1, .3, 1);
  --transition-bounce: all .45s cubic-bezier(.34, 1.56, .64, 1);
}

[data-theme="dark"] {
  --bg-base: #000000;
  --bg-surface: #0a0a0a;
  --bg-surface-2: #141414;
  --bg-surface-glass: rgba(0, 0, 0, 0.7);
  --text-main: #ffffff;
  --text-muted: #a1a1aa;
  --border-light: rgba(255, 255, 255, 0.1);
  --border-strong: rgba(255, 255, 255, 0.2);
  --shadow-glass: 0 12px 40px rgba(0, 0, 0, 0.5);
  --shadow-neon: 0 0 20px rgba(255, 255, 255, 0.1);
  --card-image: #111111;
}

[data-theme="light"] {
  --bg-base: #f4f4f5;
  --bg-surface: #ffffff;
  --bg-surface-2: #fafafa;
  --bg-surface-glass: rgba(255, 255, 255, 0.8);
  --text-main: #000000;
  --text-muted: #71717a;
  --border-light: rgba(0, 0, 0, 0.08);
  --border-strong: rgba(0, 0, 0, 0.15);
  --shadow-glass: 0 12px 40px rgba(0, 0, 0, 0.05);
  --shadow-neon: 0 10px 25px rgba(0, 0, 0, 0.05);
  --card-image: #f4f4f5;
}
        .product-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: var(--shadow-glass);
  transition: var(--transition-bounce);
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-10px);
  /* Changed gold glow to a clean white/black shadow */
  box-shadow: 0 24px 50px rgba(0, 0, 0, 0.15); 
  border-color: var(--text-main); 
}

.product-category {
  color: var(--text-muted); /* Neutralized category color */
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.product-price {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 900;
  color: var(--text-main); /* Changed from gold to main text color */
}

.product-rating {
  color: var(--text-main); /* Changed stars/rating to black/white */
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 18px;
}

.badge-new.hot {
  background: var(--text-main); /* Flips based on theme (white in dark, black in light) */
  color: var(--bg-surface);
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
  border-color: transparent;
}

/* Update general buttons to match */
.btn {
  background: var(--text-main);
  color: var(--bg-surface);
  border-radius: 999px;
  box-shadow: var(--shadow-neon);
}

.btn:hover {
  background: var(--text-muted);
  transform: translateY(-3px);
}
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">The Egyptian King</a>
        <nav style="font-size: 0.8rem; font-weight: bold; text-transform: uppercase;">New Drops</nav>
        <div>Cart (0)</div>
    </header>

   <main class="container">
        <div class="product-grid">
            <!-- Product 1 -->
            <a href="https://i.postimg.cc/8CH3yXxy/516715712-17866882896411646-829132566278910828-n.jpg" class="product-card">
                <div class="https://i.postimg.cc/8CH3yXxy/516715712-17866882896411646-829132566278910828-n.jpg">
                    <img src="https://i.postimg.cc/8CH3yXxy/516715712-17866882896411646-829132566278910828-n.jpg" alt="QUEEN NEFERTITI HOODIE">
                </div>
                <div class="category">HOODIE</div>
                <div class="details">
                    <span>QUEEN NEFERTITI HOODIE</span>
                    <span>EGP850</span>
                </div>
            </a>

            <!-- Product 2 -->
            <a href="https://i.postimg.cc/1XNvZv7k/472608428-17843821857411646-5190413624021546847-n.jpg" class="product-card">
                <div class="https://i.postimg.cc/1XNvZv7k/472608428-17843821857411646-5190413624021546847-n.jpg">
                    <img src="https://i.postimg.cc/1XNvZv7k/472608428-17843821857411646-5190413624021546847-n.jpg" alt="KHABY LAME HOODIE">
                </div>
                <div class="category">HOODIE</div>
                <div class="details">
                    <span>KHABY LAME HOODIE</span>
                    <span>EGP800</span>
                </div>
            </a>
            
            <!-- Repeat for more products -->
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Instagram</a>
            <a href="#">Shipping</a>
            <a href="#">Terms</a>
        </div>
        <p style="font-size: 0.7rem; opacity: 0.4;">© 2026 THE EGYPTIAN KING CLOTHING BRAND</p>
    </footer>

</body>
</html>
