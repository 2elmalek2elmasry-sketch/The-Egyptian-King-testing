<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | The Archive</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --card-bg: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); }

        /* Clean Shop Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; border-bottom: 1px solid #eee;
            position: sticky; top: 0; background: #fff; z-index: 100;
        }
        .logo { font-weight: 900; text-transform: uppercase; text-decoration: none; color: #000; }

        /* Product Grid */
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 items on desktop */
            gap: 40px 20px;
        }

        /* Product Card */
        .product-card { text-decoration: none; color: inherit; display: block; }
        .img-holder {
            aspect-ratio: 3/4; background: var(--card-bg);
            border-radius: 10px; overflow: hidden; margin-bottom: 15px;
        }
        .img-holder img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover img { transform: scale(1.05); }

        .details { display: flex; justify-content: space-between; font-weight: 600; font-size: 0.9rem; }
        .category { font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; margin-bottom: 5px; }

        /* Mobile Product Grid */
        @media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { 
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 20px 10px; } 
            header { padding: 15px 20px; }
        }

        /* Footer */
        footer {
            background: #000; color: #fff; padding: 60px 20px;
            text-align: center; margin-top: 100px;
        }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .footer-links a { color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Archive</a>
        <nav style="font-size: 0.8rem; font-weight: bold; text-transform: uppercase;">New Drops</nav>
        <div>Cart (0)</div>
    </header>

    <main class="container">
        <div class="product-grid">
            <!-- Product 1 -->
            <a href="#" class="product-card">
                <div class="img-holder">
                    <img src="product1.jpg" alt="Pharaoh Hoodie">
                </div>
                <div class="category">Apparel</div>
                <div class="details">
                    <span>Pharaoh Print Hoodie</span>
                    <span>$125</span>
                </div>
            </a>

            <!-- Product 2 -->
            <a href="#" class="product-card">
                <div class="img-holder">
                    <img src="product2.jpg" alt="Newspaper Hoodie">
                </div>
                <div class="category">Apparel</div>
                <div class="details">
                    <span>Vintage News Hoodie</span>
                    <span>$125</span>
                </div>
            </a>
            
            <!-- Repeat for more products -->
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Instagram</a>
            <a href="#">Shipping</a>
            <a href="#">Terms</a>
        </div>
        <p style="font-size: 0.7rem; opacity: 0.4;">© 2026 THE ARCHIVE CLOTHING BRAND</p>
    </footer>

</body>
</html>
