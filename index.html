<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHIVE | Home</title>
    <style>
        :root {
            --accent: #d1ff27; /* Neon yellow from image_d71818_3.jpg */
            --bg: #0a0a0a;
            --text: #ffffff;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main);
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* Nav Header */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 40px; mix-blend-mode: difference;
        }
        .logo { font-weight: 900; font-size: 1.5rem; text-transform: uppercase; letter-spacing: -1px; }
        nav { display: flex; gap: 30px; }
        nav a { color: white; text-decoration: none; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }

        /* Hero Section */
        .hero {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative; padding: 20px;
        }
        .hero-bg {
            position: absolute; top: 10%; width: 80%; height: 80%;
            background: url('your-hero-image.jpg') center/cover no-repeat;
            border-radius: 15px; z-index: -1; filter: brightness(0.7);
        }
        .hero-title {
            font-size: clamp(3rem, 15vw, 12rem);
            text-transform: uppercase; line-height: 0.8; text-align: center;
            font-weight: 900; letter-spacing: -5px;
        }

        /* Scroll Content Section */
        .content-block {
            min-height: 80vh; padding: 100px 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        .content-block h2 { font-size: 3rem; text-transform: uppercase; margin-bottom: 20px; max-width: 800px; }
        .content-block p { font-size: 1.2rem; opacity: 0.7; max-width: 600px; margin-bottom: 40px; }

        /* The Shop Button */
        .shop-now-trigger {
            background-color: var(--accent);
            color: #000;
            padding: 25px 80px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 100px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .shop-now-trigger:hover { transform: scale(1.1); background-color: #fff; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            header { padding: 20px; }
            nav { display: none; }
            .hero-title { letter-spacing: -2px; }
            .content-block h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Archive™</div>
        <nav>
            <a href="shop.html">Shop</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
        <div class="cart-count">Bag (0)</div>
    </header>

    <section class="hero">
        <div class="hero-bg"></div>
        <h1 class="hero-title">STREET<br>LEVEL</h1>
    </section>

    <section class="content-block">
        <h2>Curated for the Modern Dynasty</h2>
        <p>Explore our latest drop of heavyweight hoodies and custom newspaper-print apparel designed for the concrete.</p>
        <a href="shop.html" class="shop-now-trigger">Shop Now</a>
    </section>

</body>
</html>
