<!-- Place this inside your existing page, usually at the end of body -->
<div id="checkout-modal" class="modal-overlay" style="display:none;">
  <div style="background:#111; padding:30px; border-radius:20px; max-width:500px; width:100%; position:relative;">
    <span onclick="closeModal()" style="position:absolute; top:15px; right:20px; cursor:pointer;">✕</span>
    <div id="step-1-summary"></div>

    <div id="step-2-shipping" style="display:none; margin-top:20px;">
      <h3>Billing Details</h3>
      <form id="billingForm" onsubmit="event.preventDefault();">
        <input type="text" id="firstName" placeholder="First Name" required style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">
        <input type="text" id="lastName" placeholder="Last Name" required style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">
        <input type="text" id="billingAddress" placeholder="Billing Address" required style="width:100%; padding:12px; margin-bottom:15px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">
        <h4>Choose Payment Method</h4>
        <label><input type="radio" name="paymentMethod" value="card" required> Pay with Card</label>
        <label><input type="radio" name="paymentMethod" value="paypal" required> Pay with PayPal</label>
        <button type="submit" onclick="handleCheckout()">Place Order</button>
      </form>
    </div>
  </div>
</div>
